spring:
  application:
    name: played-it
  datasource:
    url: jdbc:mysql://localhost:3306/played_it?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.playedit

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

steam:
  api:
    key: <Steam_API_Key>